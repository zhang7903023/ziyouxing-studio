<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在 | 自由行Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0a;
            --text: #f0ede8;
            --text2: #8a8580;
            --accent: #ff6b35;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 480px; }
        .code {
            font-size: 96px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -4px;
        }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: var(--text2); margin-bottom: 32px; line-height: 1.7; }
        a {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>页面不存在</h1>
        <p>你访问的页面已搬家或不存在。你可以回到首页或文章列表找找看。</p>
        <a href="index.html">← 返回首页</a>
    </div>
</body>
</html>
