<html lang="en">
<head>

            border: 1px solid var(--line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.035);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);

        h1 {

        }

        p {

            color: var(--muted);
